<html xmlns:th="http://www.thymeleaf.org">

<body>
	<!-- jo javas uz html - $, no html uz java - * -->
	<!-- jalieto button type=submit, jo tas izsauks post kontrolieri -->
	<h1>Ludzu ievadi datus par produktu</h1>
	<form method="post" th:object="${product}" th:action="@{/product/crud/add}">
		<table>
			<tr>
				<td> Nosaukums: </td>
				<td><input type=text th:field="*{title}"></input></td> 
			</tr>
			
			<tr>
				<td> Cena: </td>
				<td><input type=text th:field="*{price}"></input></td>
			</tr>
			
			<tr>
				<td> Daudzums: </td>
				<td><input type=text th:field="*{quantity}"></input></td> 
			</tr>
					
			<tr>
				<td> Apraksts: </td>
				<td><input type=text th:field="*{description}"></input></td> 
			</tr>
							
			<tr>
				<td> Tips: </td>
				<td><input type=text th:field="*{productType}"></input></td> 
			</tr>
		</table>
		<button type="submit">Saglabat</button>
	</form>
</body>
	
</html>
